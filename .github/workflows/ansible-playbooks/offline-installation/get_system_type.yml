---

- hosts: all
  gather_facts: no
  become: true

  tasks:
    - name: Detect system type
      shell: |
        if command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1 || command -v zypper >/dev/null 2>&1; then
          echo "rpm"
        elif command -v apt-get >/dev/null 2>&1; then
          echo "deb"
        else
          echo "unknown"
        fi
      register: system_detect
      changed_when: false

    - name: Print system type
      ansible.builtin.debug:
        msg: "{{ system_detect.stdout }}"
