---

- hosts: all
  gather_facts: no
  become: true

  tasks:
    - name: Detect system type
      shell: |
        if command -v dnf >/dev/null 2>&1 || command -v yum >/dev/null 2>&1 || command -v zypper >/dev/null 2>&1; then
          echo "rpm"
        elif command -v apt-get >/dev/null 2>&1; then
          echo "deb"
        else
          echo "unknown"
        fi
      register: system_type

    - name: Save system type
      set_fact:
        detected_system: "{{ system_type.stdout | trim }}"
